<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriBuddy - Seu Coach Nutricional</title>
    <meta name="description" content="Acompanhe suas calorias e macronutrientes de forma simples e inteligente." />
    <meta name="author" content="NutriBuddy" />

    <meta property="og:title" content="NutriBuddy - Seu Coach Nutricional" />
    <meta property="og:description" content="Acompanhe suas calorias e macronutrientes de forma simples e inteligente." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>

    <!-- Script que detecta premium antes do React iniciar -->
    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get("premium") === "true") {
        localStorage.setItem("premium_user","true");
        window.history.replaceState({}, document.title, "/"); // remove ?premium=true da URL
      }
    </script>

    <!-- Script do React -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Botão manual para teste -->
    <button onclick="ativarPremium()">Já paguei</button>

    <script>
      function ativarPremium() {
        localStorage.setItem("premium_user","true");
        location.reload();
      }

      // Remove anúncios se o usuário já for premium
      if (localStorage.getItem("premium_user") === "true") {
        document.querySelectorAll(".ad-container").forEach(el => el.remove());
      }
    </script>
  </body>
</html>
